  if (targetActivo === null) {

  const modelo = document.querySelector(`#modelo${targetActivo}`);

  if (!animando) {
    modelo.setAttribute("animation", {

});

  dir: "alternate",
  loop: true,
  dur: 300
});
    animando = true;
  } else {
    modelo.removeAttribute("animation");
    modelo.removeAttribute("animation__scale");
    particulas.setAttribute("particle-system", "particleCount: 0");
    luz.removeAttribute("animation");
luz.setAttribute("intensity", 0);
    animando = false;
  }

const fotosGaleria = [];
//function de foto
function tomarFoto(){

  const video = document.querySelector("video");
  const canvasAR = document.querySelector("a-scene canvas");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // dibujar cámara
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  // dibujar AR
  ctx.drawImage(canvasAR,0,0,canvas.width,canvas.height);

  const imagen = canvas.toDataURL("image/png");

  // descargar automáticamente
  const link = document.createElement("a");
  link.href = imagen;
  link.download = "foto-ar.png";
  link.click();

  // mostrar en galería
  agregarAGaleria(imagen);

}
//function ga
function agregarAGaleria(src){

  const galeria = document.getElementById("galeria");

  const img = document.createElement("img");
  img.src = src;

  img.style.width = "120px";
  img.style.margin = "6px";
  img.style.borderRadius = "10px";

  galeria.appendChild(img);

}

function trivia() {
  if (targetActivo === null) {
    mostrarPanel("Primero escanea una imagen 👀");
    return;
  }
  preguntaActualIndice = 0;
  puntajeTrivia = 0;
  cargarPregunta();
}
function cargarPregunta() {
  const listaPreguntas = preguntas[targetActivo];
  if (!listaPreguntas || preguntaActualIndice >= listaPreguntas.length) {
    mostrarPanel(`🏆 ¡Trivia terminada!<br>Puntaje: ${puntajeTrivia} de ${listaPreguntas.length}`);
    return;
  }
  const p = listaPreguntas[preguntaActualIndice];
  let html = `<h3>Pregunta ${preguntaActualIndice + 1}</h3>`;
  html += `<p>${p.pregunta}</p>`;
  p.opciones.forEach((opcion, index) => {
    html += `
      <button onclick="verificarRespuesta(${index}, ${p.correcta})" style="display:block; width:100%; margin-bottom:5px;">
        ${opcion}
      </button>
    `;
  });  mostrarPanel(html);
}
function verificarRespuesta(seleccion, correcta) {
  const listaPreguntas = preguntas[targetActivo];
  if (seleccion === correcta) {
    puntajeTrivia++;
  }
  preguntaActualIndice++;
  setTimeout(cargarPregunta, 300); 
}

function toggleJuego(){

if(cont.style.display === "block"){
cont.style.display = "none";
juegoActivo = false;
}else{
cont.style.display = "block";
}

function iniciarJuego(){

clearTimeout(tiempoBalon);
clearTimeout(temporizador);

const zona = document.getElementById("zonaJuego");
zona.innerHTML = "";

puntos = 0;
juegoActivo = true;

tiempoLimite = 2000;        

document.getElementById("puntos").innerText = "Puntos: 0";
document.getElementById("tiempoJuego").innerText = "Tiempo: --";

document.getElementById("gameOverPanel").style.display = "none";

aparecerBalon();
}
function aparecerBalon(){
  if(!juegoActivo) return;
  const zona = document.getElementById("zonaJuego");
  const balon = document.createElement("div");
  balon.innerText = "⚽";
  balon.className = "balon";
  balon.style.left = Math.random()*80 + "%";
  balon.style.top = Math.random()*80 + "%";
  zona.appendChild(balon);
  // si ya pasaste 5 puntos empieza el temporizador
  if(puntos >= 5){
    document.getElementById("tiempoJuego").innerText =
      "Tiempo: " + (tiempoLimite/1000).toFixed(1) + "s";
    temporizador = setTimeout(gameOver, tiempoLimite);
  }
  balon.onclick = function(){
    if(temporizador) clearTimeout(temporizador);
    puntos++;
    document.getElementById("puntos").innerText =
      "Puntos: " + puntos;
    balon.remove();
    // reducir tiempo progresivamente
    if(puntos >= 5){
      tiempoLimite -= 150;
      if(tiempoLimite < tiempoMinimo){
        tiempoLimite = tiempoMinimo;
      }
    }
    tiempoBalon = setTimeout(aparecerBalon,500);
  };
}
function gameOver(){
juegoActivo = false;
clearTimeout(tiempoBalon);
clearTimeout(temporizador);
document.getElementById("resultadoFinal").innerText =
"Puntuación final: " + puntos;
document.getElementById("gameOverPanel").style.display = "block";
}
function reiniciarJuego(){
  iniciarJuego();
}
function cerrarJuego(){
document.getElementById("gameOverPanel").style.display = "none";
juegoActivo = false;
}
